name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          ls -la
          unzip "پنل-هوشمند-آموزشی.zip" 2>/dev/null || unzip educational-panel-smart.zip 2>/dev/null || unzip *.zip
          ls -la

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and Build
        run: |
          cd app-smart
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "build-tools;35.0.0" "platforms;android-36"

      - name: Capacitor Sync
        run: |
          cd app-smart
          npx cap sync android

      - name: Build APK
        run: |
          cd app-smart/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maz-panel-apk
          path: app-smart/android/app/build/outputs/apk/debug/app-debug.apk
