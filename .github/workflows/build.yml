name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          unzip -o educational-panel-v9.zip
          mv educational-panel-v9 educational-apk

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Fix launcher icons
        run: |
          cd educational-apk/android/app/src/main/res

          # ساخت پوشه mipmap-v26 برای adaptive icons
          mkdir -p mipmap-v26

          ICON_XML='<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>'

          echo "$ICON_XML" > mipmap-v26/ic_launcher.xml
          echo "$ICON_XML" > mipmap-v26/ic_launcher_round.xml

          # جایگزینی آیکون‌های ساده در همه پوشه‌های mipmap با bitmap معتبر
          BITMAP_XML='<?xml version="1.0" encoding="utf-8"?>
          <bitmap xmlns:android="http://schemas.android.com/apk/res/android"
              android:src="@drawable/ic_launcher_background" />'

          for folder in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi; do
            echo "$BITMAP_XML" > $folder/ic_launcher.xml
            echo "$BITMAP_XML" > $folder/ic_launcher_round.xml
          done

      - name: Make gradlew executable
        run: |
          cd educational-apk/android
          if [ -f gradlew ]; then
            chmod +x gradlew
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: |
          cd educational-apk/android
          if [ -f gradlew ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            gradle assembleDebug --no-daemon --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maz-panel-apk
          path: educational-apk/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
