name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract zip
        run: unzip educational-panel-smart.zip

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install and Build
        run: |
          cd app-smart
          npm install
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Capacitor Copy
        run: |
          cd app-smart
          npx cap copy android

      - name: Build APK
        run: |
          cd app-smart/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: maz-panel-apk
          path: app-smart/android/app/build/outputs/apk/debug/app-debug.apk
