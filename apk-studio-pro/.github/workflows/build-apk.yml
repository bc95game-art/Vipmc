name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "⚠️  No .zip file found in repo root — skipping APK build"
            exit 0
          fi
          echo "Found zip: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted_project
          INNER=$(ls extracted_project/ | head -1)
          echo "Inner folder: $INNER"
          mv "extracted_project/$INNER" project-apk
          echo "✅ Extracted to: project-apk/"
          ls project-apk/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Fix adaptive icon resources
        run: |
          BASE=project-apk/android/app/src/main/res
          if [ ! -d "$BASE" ]; then
            echo "No res dir found — skipping icon fix"
            exit 0
          fi

          command -v convert >/dev/null 2>&1 || {
            sudo apt-get update -qq
            sudo apt-get install -y -qq imagemagick
          }

          mkdir -p $BASE/mipmap-anydpi-v26

          for folder in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            for icon in ic_launcher.xml ic_launcher_round.xml; do
              if [ -f "$BASE/$folder/$icon" ]; then
                cp "$BASE/$folder/$icon" "$BASE/mipmap-anydpi-v26/$icon" 2>/dev/null || true
                rm -f "$BASE/$folder/$icon"
              fi
            done
          done

          BG_COLOR="#1565C0"
          declare -A SIZES=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for folder in "${!SIZES[@]}"; do
            size=${SIZES[$folder]}
            mkdir -p "$BASE/$folder"
            if [ ! -f "$BASE/$folder/ic_launcher.png" ]; then
              if [ -f "$BASE/drawable/ic_launcher_foreground.png" ]; then
                convert -size ${size}x${size} xc:"$BG_COLOR" \
                  \( "$BASE/drawable/ic_launcher_foreground.png" -resize ${size}x${size} \) \
                  -gravity center -composite \
                  "$BASE/$folder/ic_launcher.png" 2>/dev/null || \
                convert -size ${size}x${size} xc:"$BG_COLOR" "$BASE/$folder/ic_launcher.png"
              else
                convert -size ${size}x${size} xc:"$BG_COLOR" "$BASE/$folder/ic_launcher.png" 2>/dev/null || true
              fi
              [ -f "$BASE/$folder/ic_launcher.png" ] && \
                cp "$BASE/$folder/ic_launcher.png" "$BASE/$folder/ic_launcher_round.png"
            fi
          done
          echo "✅ Adaptive icons fixed"

      - name: Make gradlew executable
        run: |
          if [ -f project-apk/android/gradlew ]; then
            chmod +x project-apk/android/gradlew
            echo "✅ gradlew executable"
          else
            echo "⚠️  gradlew not found"
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('project-apk/android/**/*.gradle*', 'project-apk/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        working-directory: project-apk/android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug \
              --no-daemon \
              --stacktrace \
              --warning-mode all \
              -Pandroid.suppressUnsupportedCompileSdk=34
          else
            gradle assembleDebug --no-daemon --stacktrace
          fi

      - name: Find & verify APK
        run: |
          echo "Built APK files:"
          find project-apk -name "*.apk" -type f | while read f; do
            echo "  ✅ $f  ($(du -sh "$f" | cut -f1))"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: project-apk/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
