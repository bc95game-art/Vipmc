name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          unzip -o educational-panel-v10.zip
          mv panel_v10 educational-apk

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Create res folders and icons
        run: |
          BASE=educational-apk/android/app/src/main/res

          # ساخت همه پوشه‌های لازم
          mkdir -p $BASE/mipmap-mdpi
          mkdir -p $BASE/mipmap-hdpi
          mkdir -p $BASE/mipmap-xhdpi
          mkdir -p $BASE/mipmap-xxhdpi
          mkdir -p $BASE/mipmap-xxxhdpi
          mkdir -p $BASE/drawable
          mkdir -p $BASE/layout
          mkdir -p $BASE/values

          # ساخت آیکون‌ها با ImageMagick (رنگ سبز پنل)
          declare -A sizes=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for folder in "${!sizes[@]}"; do
            size=${sizes[$folder]}
            convert -size ${size}x${size} xc:#2f6f3e \
              -fill white -gravity center \
              -font DejaVu-Sans-Bold -pointsize $((size/3)) \
              -annotate 0 "MAZ" \
              $BASE/$folder/ic_launcher.png
            cp $BASE/$folder/ic_launcher.png $BASE/$folder/ic_launcher_round.png
          done

          # drawable background برای adaptive icon
          cat > $BASE/drawable/ic_launcher_background.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#2f6f3e"/>
          </shape>
          XMLEOF

          # strings.xml
          cat > $BASE/values/strings.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">پنل آموزشی ماز</string>
          </resources>
          XMLEOF

          # colors.xml
          cat > $BASE/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#2f6f3e</color>
              <color name="colorPrimaryDark">#1e4a29</color>
              <color name="colorAccent">#c9a227</color>
          </resources>
          XMLEOF

          # styles.xml
          cat > $BASE/values/styles.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
          </resources>
          XMLEOF

          echo "Res folders and icons created successfully"
          ls -la $BASE/

      - name: Create AndroidManifest
        run: |
          MANIFEST=educational-apk/android/app/src/main/AndroidManifest.xml
          mkdir -p educational-apk/android/app/src/main

          cat > $MANIFEST << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

              </application>

          </manifest>
          XMLEOF

          echo "AndroidManifest created"

      - name: Create settings.gradle
        run: |
          cat > educational-apk/android/settings.gradle << 'SGEOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MazPanel"
          include ':app'
          SGEOF

          echo "settings.gradle created"

      - name: Update version in build.gradle
        run: |
          sed -i 's/versionCode 7/versionCode 10/' educational-apk/android/app/build.gradle
          sed -i 's/versionName "7.0"/versionName "10.0"/' educational-apk/android/app/build.gradle
          echo "build.gradle updated"

      - name: Make gradlew executable
        run: |
          cd educational-apk/android
          if [ -f gradlew ]; then
            chmod +x gradlew
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: |
          cd educational-apk/android
          if [ -f gradlew ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            gradle assembleDebug --no-daemon --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maz-panel-apk
          path: educational-apk/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
