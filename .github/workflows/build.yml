name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          unzip -o educational-panel-v10.zip
          mv educational-panel-v10 educational-apk

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Fix adaptive icon resources
        run: |
          BASE=educational-apk/android/app/src/main/res

          command -v convert >/dev/null || (sudo apt-get update && sudo apt-get install -y imagemagick)

          # <adaptive-icon> requires a -v26 qualifier folder; move the XML icons there
          mkdir -p $BASE/mipmap-anydpi-v26
          mv $BASE/mipmap-mdpi/ic_launcher.xml $BASE/mipmap-anydpi-v26/ic_launcher.xml
          mv $BASE/mipmap-mdpi/ic_launcher_round.xml $BASE/mipmap-anydpi-v26/ic_launcher_round.xml
          rm -f $BASE/mipmap-hdpi/ic_launcher.xml $BASE/mipmap-hdpi/ic_launcher_round.xml
          rm -f $BASE/mipmap-xhdpi/ic_launcher.xml $BASE/mipmap-xhdpi/ic_launcher_round.xml
          rm -f $BASE/mipmap-xxhdpi/ic_launcher.xml $BASE/mipmap-xxhdpi/ic_launcher_round.xml

          # Generate flat PNG fallback icons for API < 26
          declare -A sizes=( ["mipmap-mdpi"]=48 ["mipmap-hdpi"]=72 ["mipmap-xhdpi"]=96 ["mipmap-xxhdpi"]=144 ["mipmap-xxxhdpi"]=192 )

          for folder in "${!sizes[@]}"; do
            size=${sizes[$folder]}
            mkdir -p $BASE/$folder
            convert -size ${size}x${size} xc:"#2f6f3e" \
              \( $BASE/drawable/ic_launcher_foreground.png -resize ${size}x${size} \) \
              -gravity center -composite \
              $BASE/$folder/ic_launcher.png
            cp $BASE/$folder/ic_launcher.png $BASE/$folder/ic_launcher_round.png
          done

          echo "Adaptive icons fixed"

      - name: Make gradlew executable
        run: |
          cd educational-apk/android
          if [ -f gradlew ]; then
            chmod +x gradlew
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: |
          cd educational-apk/android
          if [ -f gradlew ]; then
            ./gradlew assembleDebug --no-daemon --stacktrace
          else
            gradle assembleDebug --no-daemon --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maz-panel-apk
          path: educational-apk/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
