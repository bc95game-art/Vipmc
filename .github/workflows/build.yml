name: Build APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          unzip "پنل-هوشمند-آموزشی.zip" 2>/dev/null || unzip educational-panel-smart.zip 2>/dev/null || unzip *.zip

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and Build
        run: |
          cd app-smart
          npm install
          npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Capacitor fresh
        run: |
          cd app-smart
          npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.maz.educational",
            "appName": "MAZ Panel",
            "webDir": "dist",
            "server": {
              "androidScheme": "file"
            }
          }
          EOF
          npx cap add android
          npx cap sync android

      - name: Fix Gradle wrapper
        run: |
          cd app-smart/android
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Build APK
        run: |
          cd app-smart/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maz-panel-apk
          path: app-smart/android/app/build/outputs/apk/debug/app-debug.apk
